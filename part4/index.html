<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Places</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="brand">
                <img src="images/logo.png" alt="HBnB logo" class="logo">
                <span class="brand-name">HBnB</span>
            </a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </div>
    </header>

    <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>

    <main class="page-content">
        <section class="hero">
            <h1>Find your next stay</h1>
            <p>Browse comfortable places, compare prices, and explore amenities.</p>
        </section>

        <section id="filter" class="filter-bar">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="">All</option>
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </section>

        <section id="places-list" class="places-grid">
            <!-- Places will be populated dynamically -->
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
